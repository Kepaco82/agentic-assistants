name: Validate Assistants

on:
  push:
  pull_request:

jobs:
  validate-assistant-structure:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate canonical assistant structure
        run: python scripts/check_assistant_structure.py